# ── AeroCast CI — lint + test ─────────────────────────────────────────────
#
# Runs on every push and on PRs targeting main.
#
# Jobs
# ----
#   lint   black / isort / flake8 (fast, no heavy deps)
#   test   pytest with coverage   (full dep install)
#
# Secrets required: none (W&B is mocked in unit tests)

name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  # ── Lint ──────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install linters
        run: pip install black==24.4.2 isort==5.13.2 flake8==7.1.0

      - name: black
        run: black --check src/ api/ tests/

      - name: isort
        run: isort --check-only src/ api/ tests/

      - name: flake8
        run: flake8 src/ api/ tests/ --max-line-length=88 --extend-ignore=E203,W503

  # ── Test ──────────────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: pip-${{ runner.os }}-

      - name: Install PyTorch (CPU)
        run: pip install torch --index-url https://download.pytorch.org/whl/cpu

      - name: Install project dependencies
        run: |
          pip install \
            "lightning>=2.0.0,<3.0.0" \
            "lightgbm>=4.3.0,<5.0.0" \
            "scikit-learn>=1.5.0,<2.0.0" \
            "wandb>=0.17.0,<1.0.0" \
            "evidently>=0.4.0,<1.0.0" \
            "apache-airflow>=2.11.0,<3.0.0" \
            "fastapi>=0.111.0,<0.200.0" \
            "uvicorn[standard]>=0.30.0,<1.0.0" \
            "pandas>=2.2.0,<3.0.0" \
            "numpy>=1.26.0,<2.0.0" \
            "pydantic>=2.7.0,<3.0.0" \
            "pydantic-settings>=2.3.0,<3.0.0" \
            "prometheus-client>=0.20.0,<1.0.0" \
            "python-dotenv>=1.0.0,<2.0.0" \
            "requests>=2.32.0,<3.0.0" \
            "pyyaml>=6.0" \
            "pytest>=8.2.0,<9.0.0" \
            "pytest-cov>=5.0.0,<6.0.0" \
            "pytest-asyncio>=0.23.0,<1.0.0" \
            "httpx>=0.27.0,<1.0.0"

      - name: Run tests
        run: |
          pytest tests/unit/ -v \
            --cov=src/aerocast \
            --cov-report=term-missing \
            --cov-report=xml
        env:
          PYTHONPATH: src

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-xml
          path: coverage.xml
