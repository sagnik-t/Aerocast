# ── AeroCast — Docker Compose (local stack) ───────────────────────────────
#
# Services
# --------
#   aerocast-api   FastAPI serving container (port 8000)
#   prometheus     Scrapes /metrics every 15 s (port 9090)
#   grafana        Pre-provisioned dashboard (port 3000, admin/admin)
#
# Usage
# -----
#   docker compose up --build
#   open http://localhost:8000/docs      # API docs
#   open http://localhost:9090           # Prometheus UI
#   open http://localhost:3000           # Grafana (admin / admin)
#
# Env vars
# --------
#   Copy .env.example to .env and fill in WANDB_* + OPENAQ_API_KEY before
#   starting.  Railway vars (RAILWAY_*) are only needed in Phase 9.

services:
  aerocast-api:
    build:
      context: .
      dockerfile: api/Dockerfile
    ports:
      - "8000:8000"
    env_file: .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  prometheus:
    image: prom/prometheus:v2.52.0
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      - aerocast-api
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=7d"

  grafana:
    image: grafana/grafana:10.4.2
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-storage:/var/lib/grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/aerocast.json
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  grafana-storage:
